<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediAssist — Retrieval Inspector</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7f9;--surface:#fff;--border:#e2e5ea;--border-s:#c8cdd6;
  --text:#1a1d23;--text2:#4b5263;--text3:#8b92a0;
  --teal:#1d9e75;--teal-dk:#0f6e56;--teal-lt:#e1f5ee;--teal-md:#9fe1cb;
  --purple:#7f77dd;--purple-lt:#eeedfe;
  --amber:#ba7517;--amber-lt:#faeeda;
  --red:#e24b4a;--red-lt:#fcebeb;
  --r:8px;--rl:14px;--mono:'Cascadia Code','Fira Code',monospace;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── Shell ── */
.shell{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{background:var(--teal-dk);display:flex;align-items:center;gap:10px;padding:0 20px}
.tlogo{width:28px;height:28px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px}
.ttitle{font-size:14px;font-weight:600;color:#fff}
.tbadge{font-size:11px;background:rgba(255,255,255,.12);color:var(--teal-md);padding:2px 8px;border-radius:99px}
.tlink{margin-left:auto;font-size:12px;color:var(--teal-md);text-decoration:none;opacity:.8}
.tlink:hover{opacity:1}
.body{display:grid;grid-template-columns:300px 1fr;overflow:hidden}

/* ── Sidebar ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.s-sect{padding:12px 14px;border-bottom:1px solid var(--border)}
.s-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* ── Search panel ── */
.search-box{width:100%;padding:8px 10px;border:1.5px solid var(--border-s);border-radius:var(--r);font-size:13px;font-family:inherit;resize:none;outline:none;transition:border-color .15s}
.search-box:focus{border-color:var(--teal)}
.search-row{display:flex;gap:6px;margin-top:6px}
.search-topk{width:64px;padding:5px 8px;border:1px solid var(--border-s);border-radius:var(--r);font-size:12px}
.search-btn{flex:1;padding:6px;border:none;border-radius:var(--r);background:var(--teal);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.search-btn:hover{background:var(--teal-dk)}
.search-btn:disabled{background:var(--border-s);color:var(--text3);cursor:not-allowed}

/* ── Index panel ── */
.idx-btn{width:100%;padding:6px;border:1px solid var(--teal-md);border-radius:var(--r);background:var(--teal-lt);color:var(--teal-dk);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.idx-btn:hover{background:var(--teal);color:#fff}
.idx-btn:disabled{background:var(--bg);color:var(--text3);border-color:var(--border);cursor:not-allowed}

/* ── Doc list ── */
.doc-list{flex:1;overflow-y:auto;padding:8px}
.doc-card{border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.doc-card:hover{background:var(--bg)}
.doc-card.active{border-color:var(--teal);background:var(--teal-lt)}
.doc-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.doc-meta{font-size:11px;color:var(--text3);display:flex;gap:7px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px}
.p-ready{background:var(--teal-lt);color:var(--teal-dk)}
.p-indexed{background:var(--purple-lt);color:var(--purple)}
.p-pending{background:var(--amber-lt);color:var(--amber)}
.p-failed{background:var(--red-lt);color:var(--red)}

/* ── Main ── */
.main{display:grid;grid-template-rows:auto 1fr;overflow:hidden}

/* ── Stats bar ── */
.stats-bar{padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.stat-val{font-size:17px;font-weight:600}
.stat-sub{font-size:11px;color:var(--text3)}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .15s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--teal-dk);border-bottom-color:var(--teal)}

/* ── Content panel ── */
.content{overflow-y:auto;padding:16px 20px}

/* ── Empty state ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:8px;font-size:13px}

/* ── Chunk row ── */
.chunk-row{border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:border-color .1s}
.chunk-row:hover{border-color:var(--border-s)}
.chunk-row.expanded{border-color:var(--teal-md)}
.chunk-head{display:grid;grid-template-columns:44px 1fr auto;cursor:pointer;align-items:center}
.ch-idx{background:var(--bg);border-right:1px solid var(--border);padding:12px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);font-family:var(--mono);align-self:stretch;display:flex;align-items:center;justify-content:center}
.ch-body{padding:10px 12px}
.ch-preview{font-size:13px;color:var(--text);line-height:1.5}
.ch-preview mark{background:var(--amber-lt);color:var(--amber);border-radius:2px;padding:0 2px}
.ch-meta-row{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.ch-tag{font-size:11px;color:var(--text3)}
.ch-tag span{color:var(--text2);font-weight:500}
.ch-right{padding:10px 10px;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.ch-score{font-size:14px;font-weight:700;font-family:var(--mono)}
.score-high{color:var(--teal-dk)}
.score-mid{color:var(--amber)}
.score-low{color:var(--text3)}
.embed-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
.emb-yes{background:var(--teal-lt);color:var(--teal-dk)}
.emb-no{background:var(--amber-lt);color:var(--amber)}
.ch-expand-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:0;transition:transform .2s}
.chunk-row.expanded .ch-expand-btn{transform:rotate(90deg)}
.ch-full{display:none;padding:12px;border-top:1px solid var(--border);background:var(--bg)}
.chunk-row.expanded .ch-full{display:block}
.ch-full pre{font-size:12px;font-family:var(--mono);white-space:pre-wrap;word-break:break-word;color:var(--text2);line-height:1.7;max-height:240px;overflow-y:auto}

/* ── Token bar ── */
.tok-bar-wrap{margin-top:4px}
.tok-bar-bg{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.tok-bar-fill{height:100%;background:var(--teal);border-radius:2px}

/* ── Alerts ── */
.alert{border-radius:var(--r);padding:9px 12px;font-size:13px;margin-bottom:8px}
.alert-ok{background:var(--teal-lt);color:var(--teal-dk);border:1px solid var(--teal-md)}
.alert-err{background:var(--red-lt);color:var(--red);border:1px solid #f09595}
.alert-info{background:var(--purple-lt);color:var(--purple);border:1px solid #afa9ec}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">

<header class="topbar">
  <div class="tlogo">M</div>
  <span class="ttitle">MediAssist</span>
  <span class="tbadge">Retrieval Inspector</span>
  <a href="/" class="tlink">← Back to chat</a>
</header>

<div class="body">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Search -->
    <div class="s-sect">
      <div class="s-label">Test semantic search</div>
      <textarea class="search-box" id="search-query" rows="3"
        placeholder="What are the symptoms of hypertension?"></textarea>
      <div class="search-row">
        <input type="number" class="search-topk" id="search-topk" value="5" min="1" max="20">
        <button class="search-btn" id="search-btn" onclick="runSearch()" disabled>
          Search
        </button>
      </div>
    </div>

    <!-- Index -->
    <div class="s-sect">
      <div class="s-label">Index selected document</div>
      <button class="idx-btn" id="index-btn" onclick="indexDocument()" disabled>
        Embed + store in ChromaDB
      </button>
      <div id="index-msg" style="margin-top:6px;font-size:12px;color:var(--text3)"></div>
    </div>

    <!-- Doc list -->
    <div class="s-label" style="padding:12px 14px 0">Documents</div>
    <div class="doc-list" id="doc-list">
      <div class="empty"><span class="spinner"></span> Loading...</div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat">
        <div class="stat-lbl">Chroma vectors</div>
        <div class="stat-val" id="stat-vectors">—</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Selected doc chunks</div>
        <div class="stat-val" id="stat-chunks">—</div>
        <div class="stat-sub" id="stat-embedded">—</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Search results</div>
        <div class="stat-val" id="stat-results">—</div>
        <div class="stat-sub" id="stat-topk">top_k = 5</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Top score</div>
        <div class="stat-val" id="stat-top-score">—</div>
        <div class="stat-sub">cosine similarity</div>
      </div>
    </div>

    <!-- Tabs + content -->
    <div style="display:grid;grid-template-rows:auto 1fr;overflow:hidden">
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('search')">Search results</div>
        <div class="tab" onclick="switchTab('chunks')">All chunks</div>
      </div>
      <div class="content" id="content-panel">
        <div class="empty">Select a document and run a search</div>
      </div>
    </div>

  </main>
</div>
</div>

<script>
const API    = 'http://127.0.0.1:8000/api';
let activeDoc   = null;
let allChunks   = [];
let searchResults = [];
let currentTab  = 'search';
let maxTokens   = 1;

// ── Boot ─────────────────────────────────────────────────────────
async function boot() {
  await Promise.all([loadDocs(), loadStats()]);
}

// ── Load stats ────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API}/search/stats/`);
    const data = await res.json();
    if (data.success) {
      document.getElementById('stat-vectors').textContent = data.total_vectors.toLocaleString();
    }
  } catch {}
}

// ── Load doc list (uses debug endpoint — shows ALL docs regardless of status) ──
async function loadDocs() {
  const el = document.getElementById('doc-list');
  try {
    // Use debug/documents/ instead of search/stats/ so documents with
    // any status (ready, failed, processing, pending) all appear in the list.
    // search/stats/ only returns status="ready" documents which hides
    // failed or processing ones and leaves buttons permanently disabled.
    const res  = await fetch(`${API}/debug/documents/`);
    const data = await res.json();

    if (!data.documents?.length) {
      el.innerHTML = '<div class="empty">No documents found.<br>Upload a PDF from the main chat page.</div>';
      return;
    }

    el.innerHTML = data.documents.map(d => {
      // For vector/embed counts try the stats endpoint data if available
      const vecCount      = d.vector_count      ?? 0;
      const embeddedCount = d.embedded_chunks   ?? d.chunk_count ?? 0;
      const isIndexed     = vecCount > 0;

      return `
      <div class="doc-card ${d.id === activeDoc?.id ? 'active' : ''}"
           onclick="selectDoc(${JSON.stringify(d).replace(/"/g, '&quot;')}, this)">
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:3px">
          <div class="doc-name" style="flex:1" title="${esc(d.title)}">${esc(d.title)}</div>
          <span class="pill ${isIndexed ? 'p-indexed' : d.status === 'ready' ? 'p-pending' : 'p-' + d.status}">
            ${isIndexed ? 'indexed' : d.status}
          </span>
        </div>
        <div class="doc-meta">
          <span>${d.chunk_count ?? 0} chunks</span>
          <span>${embeddedCount} embedded</span>
          <span>${vecCount} vectors</span>
        </div>
      </div>`
    }).join('');

  } catch(e) {
    el.innerHTML = `<div class="empty" style="color:var(--red)">API unreachable: ${e.message}<br>Is Django running on :8000?</div>`;
  }
}

// ── Select doc ────────────────────────────────────────────────────
async function selectDoc(doc) {
  activeDoc = doc;
  document.getElementById('search-btn').disabled = false;
  document.getElementById('index-btn').disabled  = false;
  document.getElementById('index-msg').textContent = '';

  // Highlight card
  document.querySelectorAll('.doc-card').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // Update stats
  document.getElementById('stat-chunks').textContent   = doc.chunk_count;
  document.getElementById('stat-embedded').textContent = `${doc.embedded_chunks} embedded`;

  // Load all chunks for the "All chunks" tab
  await loadAllChunks(doc.id);

  if (currentTab === 'chunks') renderChunks(allChunks, null);
}

// ── Load all chunks ───────────────────────────────────────────────
async function loadAllChunks(docId) {
  try {
    const res  = await fetch(`${API}/debug/documents/${docId}/chunks/`);
    const data = await res.json();
    allChunks = data.chunks || [];
    maxTokens = data.token_stats?.max || 1;
  } catch { allChunks = []; }
}

// ── Run search ────────────────────────────────────────────────────
async function runSearch() {
  const query = document.getElementById('search-query').value.trim();
  const topK  = parseInt(document.getElementById('search-topk').value) || 5;
  if (!query || !activeDoc) return;

  const btn = document.getElementById('search-btn');
  btn.disabled    = true;
  btn.innerHTML   = '<span class="spinner"></span>Searching...';

  const panel = document.getElementById('content-panel');
  panel.innerHTML = '<div class="empty"><span class="spinner"></span> Running semantic search...</div>';

  document.getElementById('stat-topk').textContent = `top_k = ${topK}`;

  try {
    const res  = await fetch(`${API}/search/`, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({
        query:       query,
        document_id: activeDoc.id,
        top_k:       topK,
      }),
    });
    const data = await res.json();

    if (!data.success) {
      panel.innerHTML = `<div class="alert alert-err">${esc(data.error)}</div>`;
      return;
    }

    searchResults = data.results;
    document.getElementById('stat-results').textContent  = data.total_results;
    document.getElementById('stat-top-score').textContent =
      data.results[0] ? data.results[0].score.toFixed(4) : '—';

    switchTab('search');
    renderSearchResults(data.results, query);

  } catch(e) {
    panel.innerHTML = `<div class="alert alert-err">Search failed: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled   = false;
    btn.textContent = 'Search';
  }
}

// ── Index document ────────────────────────────────────────────────
async function indexDocument() {
  if (!activeDoc) return;
  const btn = document.getElementById('index-btn');
  const msg = document.getElementById('index-msg');
  btn.disabled    = true;
  btn.textContent = 'Indexing...';
  msg.textContent = 'Embedding chunks and storing vectors...';
  msg.style.color = 'var(--text3)';

  try {
    const res  = await fetch(`${API}/documents/${activeDoc.id}/index/`, {method:'POST'});
    const data = await res.json();

    if (data.success) {
      msg.textContent = `Done — ${data.chunks_indexed} vectors stored`;
      msg.style.color = 'var(--teal-dk)';
      document.getElementById('stat-vectors').textContent =
        data.collection_total.toLocaleString();
      await loadDocs();
    } else {
      msg.textContent = data.error;
      msg.style.color = 'var(--red)';
    }
  } catch(e) {
    msg.textContent = 'Failed: ' + e.message;
    msg.style.color = 'var(--red)';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Embed + store in ChromaDB';
  }
}

// ── Tabs ──────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'search') || (i === 1 && tab === 'chunks'));
  });
  if (tab === 'search')  renderSearchResults(searchResults, document.getElementById('search-query').value);
  if (tab === 'chunks')  renderChunks(allChunks, null);
}

// ── Render search results ─────────────────────────────────────────
function renderSearchResults(results, query) {
  const panel = document.getElementById('content-panel');
  if (!results.length) {
    panel.innerHTML = '<div class="empty">Run a search to see results here</div>';
    return;
  }
  panel.innerHTML = results.map(r => chunkCard(
    r.chunk_index, r.text, r.preview,
    r.page_start, r.page_end, r.token_count,
    true, r.score, query
  )).join('');
}

// ── Render all chunks ─────────────────────────────────────────────
function renderChunks(chunks, query) {
  const panel = document.getElementById('content-panel');
  if (!chunks.length) {
    panel.innerHTML = '<div class="empty">Select a document to see its chunks</div>';
    return;
  }
  panel.innerHTML = chunks.map(c => chunkCard(
    c.chunk_index, c.text, c.preview,
    c.page_start, c.page_end, c.token_count,
    c.is_embedded, null, query
  )).join('');
}

// ── Chunk card template ───────────────────────────────────────────
function chunkCard(idx, text, preview, pageStart, pageEnd, tokenCount, isEmbedded, score, query) {
  const pct       = Math.round((tokenCount / maxTokens) * 100);
  const pageStr   = pageStart === pageEnd ? `p.${pageStart}` : `p.${pageStart}–${pageEnd}`;
  const scoreStr  = score !== null ? score.toFixed(4) : null;
  const scoreClass = score === null ? ''
    : score >= 0.8 ? 'score-high'
    : score >= 0.6 ? 'score-mid'
    : 'score-low';

  const highlightedPreview = query
    ? esc(preview).replace(
        new RegExp(`(${esc(query).split(' ').filter(w => w.length > 3).join('|')})`, 'gi'),
        '<mark>$1</mark>'
      )
    : esc(preview);

  return `
  <div class="chunk-row" id="cr-${idx}">
    <div class="chunk-head" onclick="toggleChunk(${idx})">
      <div class="ch-idx">${idx}</div>
      <div class="ch-body">
        <div class="ch-preview">${highlightedPreview}</div>
        <div class="ch-meta-row">
          <span class="ch-tag">page <span>${pageStr}</span></span>
          <span class="ch-tag">tokens <span>${tokenCount}</span></span>
        </div>
        <div class="tok-bar-wrap">
          <div class="tok-bar-bg"><div class="tok-bar-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="ch-right">
        ${scoreStr ? `<div class="ch-score ${scoreClass}">${scoreStr}</div>` : ''}
        <span class="embed-pill ${isEmbedded ? 'emb-yes' : 'emb-no'}">
          ${isEmbedded ? 'embedded' : 'not embedded'}
        </span>
        <button class="ch-expand-btn">▶</button>
      </div>
    </div>
    <div class="ch-full">
      <pre>${esc(text)}</pre>
    </div>
  </div>`;
}

function toggleChunk(idx) {
  document.getElementById(`cr-${idx}`)?.classList.toggle('expanded');
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

boot();
</script>
</body>
</html>
